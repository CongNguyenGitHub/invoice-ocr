# .pre-commit-config.yaml
#
# Client-side gate that mirrors the fast-checks.yml workflow so developers don't
# push code that will only fail in CI. Install once with `pre-commit install`.
#
# Hooks:
#   1. trailing-whitespace / end-of-file-fixer  — hygiene
#   2. check-yaml / check-toml                   — catches malformed config
#   3. ruff-format                               — formats code
#   4. ruff                                      — lints with auto-fix
#   5. mypy                                      — type checks src/ only
#                                                  (scripts/ and tests/ intentionally
#                                                  excluded to keep hook fast)
#
# Manually: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff-format
        files: ^(src|tests|scripts)/
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src|tests|scripts)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^src/
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
