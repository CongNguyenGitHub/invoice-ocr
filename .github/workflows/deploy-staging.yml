# Deploy to staging.
#
# Triggered automatically when build-push.yml succeeds on main, OR manually
# via workflow_dispatch (so you can roll forward to a specific SHA after fix).
#
# What it does:
#   1. AWS CLI auth via repo secret (graduate to OIDC later)
#   2. Pull SSH private key from SSM /invoice-ocr/staging/ssh-private-key
#   3. Compute the IMAGE URI and SHA we're deploying
#   4. SSH to the staging VPS, run /opt/invoice-ocr/ops/deploy-here.sh
#   5. /readyz polled inside deploy-here.sh
#   6. On any failure: post a job-summary breadcrumb pointing at the box
name: Deploy → staging

on:
  workflow_run:
    workflows: ["Build + scan + push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234). Defaults to staging.'
        default: 'staging'
        required: false

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    # Skip if the upstream build didn't succeed
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `environment:` here — repo-level secrets stay visible.  Staging has no
    # approval gate (it's the test environment); prod uses environment: production.

    env:
      AWS_REGION: us-east-1
      ENV: staging
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      image_uri: ${{ steps.tag.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag + URI
        id: tag
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_URI="ghcr.io/${REPO_LC}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "image_uri=${IMAGE_URI}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${IMAGE_URI}:${TAG}"

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Pull SSH key from SSM
        run: |
          mkdir -p ~/.ssh
          aws ssm get-parameter \
            --name /invoice-ocr/staging/ssh-private-key \
            --with-decryption \
            --query 'Parameter.Value' --output text > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve VPS host (latest tagged staging instance)
        id: host
        run: |
          DNS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=invoice-ocr-staging" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicDnsName' --output text)
          if [[ -z "$DNS" || "$DNS" == "None" ]]; then
            echo "ERROR: no running staging instance found" >&2; exit 1
          fi
          echo "vps_dns=$DNS" >> "$GITHUB_OUTPUT"
          echo "Host: $DNS"

      - name: Deploy via SSH
        env:
          IMAGE: ${{ steps.tag.outputs.image_uri }}
          VPS:   ${{ steps.host.outputs.vps_dns }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              ec2-user@${VPS} \
              "sudo IMAGE=$IMAGE ENV=staging bash /opt/invoice-ocr/ops/deploy-here.sh"

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ steps.tag.outputs.image_uri }}
          VPS:   ${{ steps.host.outputs.vps_dns }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Staging deploy

          - Image: \`$IMAGE\`
          - Host: \`$VPS\`
          - SSH: \`ssh ec2-user@$VPS\` (key in SSM)

          Next: \`verify-staging.yml\` will fire automatically.
          EOF
