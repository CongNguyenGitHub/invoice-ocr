# Stack gate — load + accuracy SLA on a Docker stack.
#
# Triggers on PRs that touch the runtime / pipeline / config / prompt — paths
# where a regression could plausibly hurt accuracy or stability. Doc-only,
# CI-only, README-only PRs skip this expensive workflow.
#
# Steps:
#   1. Spin up the full Docker Compose stack
#   2. Run scripts/ci_load_test.sh (p95<10s, p99<30s, err<1%)
#   3. Run scripts/run_eval.py against TEST set, 120-record smoke slice
#   4. Run scripts/check_accuracy.py in smoke mode
#   5. Always upload eval + load reports as artifacts
#
# Required GitHub secrets:
#   GEMINI_API_KEY_CI    — Gemini API key with throttled quota for CI use
name: Stack + accuracy gate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'whitelists/**'
      - 'data/eval/**'
      - 'docker-compose*.yml'
      - 'pyproject.toml'
      - '.env.example'
      - 'experiments/baseline.json'
      - 'scripts/run_eval.py'
      - 'scripts/check_accuracy.py'
      - 'scripts/ci_load_test.sh'
      - 'scripts/load_test.py'

concurrency:
  group: stack-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stack-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: '1'
      PROMPT_SEMANTIC_VERSION: ${{ vars.PROMPT_SEMANTIC_VERSION || 'v3.7' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_CI }}
      LOAD_TEST_INPUT: data/eval/dev_set.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Stack up + load test
        run: bash scripts/ci_load_test.sh

      - name: Smoke accuracy on test set (120 records)
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          mkdir -p eval_reports
          python scripts/run_eval.py \
            --input data/eval/test_set.json \
            --max-records 120 \
            --workers 4 \
            --psv "$PROMPT_SEMANTIC_VERSION" \
            --out eval_reports/

      - name: Accuracy gate (smoke mode)
        run: |
          python scripts/check_accuracy.py \
            --report 'eval_reports/eval_report_*_test_*.json' \
            --baseline experiments/baseline.json \
            --mode smoke \
            --out accuracy_gate_result.md

      - name: Append accuracy summary to GitHub job page
        if: always()
        run: |
          if [ -f accuracy_gate_result.md ]; then
            cat accuracy_gate_result.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans || true

      - name: Upload all CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stack-gate-${{ github.run_number }}
          path: |
            eval_reports/
            load_reports/
            accuracy_gate_result.md
          retention-days: 30
