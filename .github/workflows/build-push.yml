# Build → ECR-Scan-Push workflow.
#
# Triggers on push to main and manual dispatch.  Builds the single
# invoice-ocr Docker image, scans it with Trivy (HIGH/CRITICAL fail the build),
# pushes to ghcr.io with two tags:
#   - sha-<first7>          : immutable, consumed by deploy workflows
#   - staging               : moving pointer for convenience
#
# Note: the image is the SAME for api/worker/init — docker-compose.yml decides
# which process to run via `command:`.
name: Build + scan + push

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'experiments/**'
      - 'data/**'
      - '.github/workflows/full-eval.yml'
      - '.github/workflows/fast-checks.yml'
      - '.github/workflows/stack-gate.yml'
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write       # push to ghcr.io
  id-token: write       # future OIDC use

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_URI="ghcr.io/${REPO_LC}"
          echo "image_tag=sha-${SHORT_SHA}"             >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}"                 >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}"                 >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (single-arch, no push — for Trivy)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy CVE scan (HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.image_tag }}
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln'
          format: 'table'
          output: 'trivy-report.txt'
        # We allow this step to fail the pipeline — that's the point.

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 30

      - name: Push scanned image to GHCR
        if: success()
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_uri }}:staging
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Append to job summary
        if: success()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Build + push succeeded

          | Image | Tag |
          |-------|-----|
          | \`${{ steps.meta.outputs.image_uri }}\` | \`${{ steps.meta.outputs.image_tag }}\` |
          | \`${{ steps.meta.outputs.image_uri }}\` | \`staging\` |

          No HIGH/CRITICAL CVEs (Trivy report available as artifact).
          EOF
