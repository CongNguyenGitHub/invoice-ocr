# Deploy to prod — manual, gated by GH Environment approval.
#
# Triggered only by workflow_dispatch.  The developer clicks "Run workflow"
# from the Actions tab; the `environment: production` gate pauses the job
# until a reviewer approves (configure reviewers in repo Settings →
# Environments → production).
#
# Steps:
#   1. Re-tag the ghcr.io image: sha-xxx → :production
#   2. SSH to prod VPS, run deploy-here.sh
#   3. Smoke: 3 receipts must return 200
#   4. On any failure → auto-rollback via ops/rollback.sh
name: Deploy → production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to promote (e.g. sha-abc1234). Default: current staging tag.'
        default: 'staging'
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production      # ← approval gate

    env:
      AWS_REGION: us-east-1
      ENV: prod
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image URI
        id: tag
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_URI="ghcr.io/${REPO_LC}"
          echo "image_uri=${IMAGE_URI}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "production_uri=${IMAGE_URI}:production" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag staging image as :production
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tag.outputs.production_uri }}" \
            "${{ steps.tag.outputs.image_uri }}"
          echo "promoted ${{ steps.tag.outputs.image_uri }} → :production"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Pull prod SSH key from SSM
        run: |
          mkdir -p ~/.ssh
          aws ssm get-parameter \
            --name /invoice-ocr/prod/ssh-private-key \
            --with-decryption \
            --query 'Parameter.Value' --output text > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve prod VPS host
        id: host
        run: |
          DNS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=invoice-ocr-prod" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicDnsName' --output text)
          if [[ -z "$DNS" || "$DNS" == "None" ]]; then
            echo "ERROR: no running prod instance. Run scripts/aws/provision-vps.sh ENV=prod first." >&2
            exit 1
          fi
          echo "vps_dns=$DNS" >> "$GITHUB_OUTPUT"

      - name: Deploy to prod
        id: deploy
        env:
          IMAGE: ${{ steps.tag.outputs.image_uri }}
          VPS:   ${{ steps.host.outputs.vps_dns }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              ec2-user@${VPS} \
              "sudo IMAGE=$IMAGE ENV=prod bash /opt/invoice-ocr/ops/deploy-here.sh"

      - name: Prod smoke — 3 receipts
        id: smoke
        if: steps.deploy.outcome == 'success'
        env:
          VPS: ${{ steps.host.outputs.vps_dns }}
        run: |
          pip install httpx
          python - <<'PY'
          import os, glob, sys, httpx, time
          api = f"http://{os.environ['VPS']}:8000"
          imgs = sorted(glob.glob("tests/fixtures/replay_images/*"))[:3]
          fail = 0
          for p in imgs:
              with open(p, "rb") as fh:
                  data = fh.read()
              r = httpx.post(f"{api}/v1/receipts",
                             files={"file": (os.path.basename(p), data, "image/jpeg")},
                             timeout=60.0)
              print(f"{r.status_code:3d}  {p}")
              if r.status_code not in (200, 202):
                  fail += 1
          sys.exit(1 if fail else 0)
          PY

      - name: Auto-rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        env:
          VPS: ${{ steps.host.outputs.vps_dns }}
        run: |
          echo "Smoke failed — rolling back" >&2
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              ec2-user@${VPS} \
              'sudo bash /opt/invoice-ocr/ops/rollback.sh'

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ steps.tag.outputs.image_uri }}
          VPS:   ${{ steps.host.outputs.vps_dns }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Prod deploy

          - Image: \`$IMAGE\`
          - Host: \`$VPS\`
          - Deploy: ${{ steps.deploy.outcome }}
          - Smoke: ${{ steps.smoke.outcome }}
          EOF
