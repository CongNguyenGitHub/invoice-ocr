name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_NAME: invoice-ocr

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_SCAN_RETRIES=6
          SSH_SCAN_TIMEOUT=10
          SSH_SCAN_BACKOFF=5
          touch ~/.ssh/known_hosts
          for ((i=1; i<=SSH_SCAN_RETRIES; i++)); do
            SCANNED_KEYS=$(ssh-keyscan -H -T "$SSH_SCAN_TIMEOUT" "$PRODUCTION_HOST" || true)
            if [ -n "$SCANNED_KEYS" ]; then
              printf '%s\n' "$SCANNED_KEYS" >> ~/.ssh/known_hosts
              break
            fi
            echo "ssh-keyscan attempt $i/$SSH_SCAN_RETRIES failed, retrying in ${SSH_SCAN_BACKOFF}s..."
            sleep "$SSH_SCAN_BACKOFF"
          done
          if ! ssh-keygen -F "$PRODUCTION_HOST" -f ~/.ssh/known_hosts > /dev/null; then
            echo "Failed to verify SSH host key for $PRODUCTION_HOST after $SSH_SCAN_RETRIES attempts. Check DNS, network path, and firewall rules (TCP/22)."
            exit 1
          fi

          # Deploy via SSH
          ssh -o StrictHostKeyChecking=yes -o ConnectTimeout=30 -i ~/.ssh/deploy_key ubuntu@$PRODUCTION_HOST << EOF
            set -e
            echo "✓ SSH connection successful"
            echo "Current directory: \$(pwd)"
            echo "User: \$(whoami)"

            cd /opt/invoice-ocr
            echo "✓ Changed to /opt/invoice-ocr"

            # Pull latest code
            git pull origin main

            # Set image tag
            export IMAGE=$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

            # Pull new image
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker compose pull

            # Rolling restart
            docker compose up -d

            # Wait for containers to start (10 minute grace period)
            echo "Waiting 10 minutes for containers to fully initialize..."
            sleep 600

            # Health check with retries
            echo "Starting health checks..."
            for i in {1..6}; do
              if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
                echo "✓ Deployment successful (ready after $((600 + i*10)) seconds)"
                exit 0
              fi
              echo "Health check attempt $i/6..."
              sleep 10
            done
            echo "✗ Health check failed after 11 minutes"
            docker compose ps
            docker compose logs api --tail 20
            exit 1
          EOF

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Deployment to production succeeded"
          else
            echo "❌ Deployment to production failed"
          fi
